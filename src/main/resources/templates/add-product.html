<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>

<div class="container">
    <h1>Add New Product</h1>

    <form th:action="@{/products/add}" th:object="${product}" method="post">

        <!-- Text field: name -->
        <label for="name">Name</label>
        <input type="text" id="name" th:field="*{name}" />
        <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>

        <!-- Text field: code -->
        <label for="code">Code (e.g. PRD-101)</label>
        <input type="text" id="code" th:field="*{code}" />
        <span class="error" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></span>

        <!-- Drop-down list: category -->
        <label for="category">Category</label>
        <select id="category" th:field="*{category}">
            <option value="">-- Select Category --</option>
            <option value="Electronics">Electronics</option>
            <option value="Groceries">Groceries</option>
            <option value="Clothing">Clothing</option>
            <option value="Furniture">Furniture</option>
            <option value="Stationery">Stationery</option>
        </select>
        <span class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>

        <!-- Price -->
        <label for="price">Price</label>
        <input type="number" step="0.01" id="price" th:field="*{price}" />
        <span class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>

        <!-- Quantity -->
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" th:field="*{quantity}" />
        <span class="error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></span>

        <!-- Radio buttons: status -->
        <label>Status</label>
        <div class="radio-group">
            <label><input type="radio" th:field="*{status}" value="AVAILABLE" /> Available</label>
            <label><input type="radio" th:field="*{status}" value="OUT_OF_STOCK" /> Out of Stock</label>
            <label><input type="radio" th:field="*{status}" value="DISCONTINUED" /> Discontinued</label>
        </div>
        <span class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></span>

        <!-- Check box: active -->
        <label class="checkbox-label">
            <input type="checkbox" th:field="*{active}" /> Active
        </label>

        <button type="submit">Save Product</button>
    </form>

    <a th:href="@{/products}">&larr; Back to list</a>
</div>

</body>
</html>
